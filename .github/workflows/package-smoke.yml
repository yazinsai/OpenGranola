name: package-smoke

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: package-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package-smoke:
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          sudo xcode-select -s /Applications/Xcode_26.app || sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version
          swift --version

      - name: Run package smoke check
        run: bash ./scripts/package_smoke_check.sh
