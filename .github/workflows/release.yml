name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing tag to build and publish (for example: v1.2.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare-whisper:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_tag || github.ref_name }}

      - name: Prepare whisper-rs
        run: pwsh opencassava/scripts/prepare-whisper.ps1

      - name: Upload prepared whisper-rs
        uses: actions/upload-artifact@v4
        with:
          name: whisper-rs-source
          path: .build/whisper-rs
          if-no-files-found: error

  build-windows:
    needs: prepare-whisper
    runs-on: windows-latest
    defaults:
      run:
        shell: powershell
        working-directory: opencassava

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_tag || github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: opencassava/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            opencassava/src-tauri -> target

      - name: Restore prepared whisper-rs
        uses: actions/download-artifact@v4
        with:
          name: whisper-rs-source
          path: .build/whisper-rs

      - name: Install frontend dependencies
        run: npm.cmd ci

      - name: Build Windows installers
        run: npm.cmd run tauri -- build --bundles nsis,msi

      - name: Upload Windows bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opencassava-windows-bundles
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/msi/*.msi
          if-no-files-found: error

  build-mac:
    needs: prepare-whisper
    runs-on: macos-14
    defaults:
      run:
        working-directory: opencassava

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_tag || github.ref_name }}
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: opencassava/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            opencassava/src-tauri -> target

      - name: Install macOS build dependencies
        run: brew install cmake
        working-directory: .

      - name: Restore prepared whisper-rs
        uses: actions/download-artifact@v4
        with:
          name: whisper-rs-source
          path: .build/whisper-rs

      - name: Install frontend dependencies
        run: npm ci

      - name: Build macOS DMG
        # The -U__ARM_FEATURE_MATMUL_INT8 flag is injected into the whisper-rs-sys
        # cmake build via config.cflag()/config.cxxflag() inside prepare-whisper.ps1.
        # That patch is necessary because the cmake Rust crate computes CMAKE_C_FLAGS
        # from the cc crate and appends it after any config.define() calls, so env
        # vars like CMAKE_C_FLAGS or CFLAGS are silently overridden.
        run: npm run tauri -- build --bundles dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencassava-mac-dmg
          path: target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  build-ubuntu:
    needs: prepare-whisper
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: opencassava

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_tag || github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: opencassava/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            opencassava/src-tauri -> target

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libssl-dev \
            pkg-config \
            libdbus-1-dev \
            libasound2-dev \
            cmake \
            clang \
            libclang-dev
        working-directory: .

      - name: Restore prepared whisper-rs
        uses: actions/download-artifact@v4
        with:
          name: whisper-rs-source
          path: .build/whisper-rs

      - name: Install frontend dependencies
        run: npm ci

      - name: Build .deb package
        run: npm run tauri -- build --bundles deb

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencassava-ubuntu-deb
          path: target/release/bundle/deb/*.deb
          if-no-files-found: error

  publish-release:
    needs: [build-windows, build-mac, build-ubuntu]
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_tag || github.ref_name }}

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        run: |
          TAG="${{ github.event.inputs.release_tag || github.ref_name }}"
          VERSION="${TAG#v}"
          # Extract the block between ## [VERSION] and the next ## heading
          awk "/^## \[${VERSION}\]/,/^## \[/" CHANGELOG.md \
            | head -n -1 \
            | tail -n +2 \
            > release_notes.md
          # Fall back to a minimal note if the section wasn't found
          if [ ! -s release_notes.md ]; then
            echo "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details." > release_notes.md
          fi

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          body_path: release_notes.md
          files: artifacts/**/*
